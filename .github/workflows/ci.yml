name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME || 'postgres' }}
          POSTGRES_USER: ${{ secrets.DB_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || '1234' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create .env file from secrets
      run: |
        echo "DB_HOST=localhost" >> .env
        echo "DB_NAME=${{ secrets.DB_NAME || 'postgres' }}" >> .env
        echo "DB_USER=${{ secrets.DB_USER || 'postgres' }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD || '1234' }}" >> .env
        echo "DB_PORT=5432" >> .env

    - name: Run Database Tests
      env:
        DB_HOST: localhost
        DB_NAME: ${{ secrets.DB_NAME || 'postgres' }}
        DB_USER: ${{ secrets.DB_USER || 'postgres' }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD || '1234' }}
      run: |
        python test_db.py
